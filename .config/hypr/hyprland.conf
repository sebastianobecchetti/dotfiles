

#######################################################################################
# HYPRLAND CONFIGURATION FILE
# Cleaned & organized version
# Reference: https://wiki.hyprland.org/Configuring/
#######################################################################################

# Import pywal colors
source = /home/sebastiano/.cache/wal/colors-hyprland


################
### MONITORS ###
################
# Example: monitor=name,resolution@Hz,position,scale
monitor = , highres, auto, 1.5
monitor = HDMI-A-1, 3840x2160@30, 1280x0, 2


###################
### APPLICATIONS ###
###################
# Define commonly used programs
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun -n


#################
### AUTOSTART ###
#################
# Launch applications and daemons at startup
exec-once = waybar & hyprpaper &
exec-once = hypridle &
exec-once = swww-daemon
exec-once = redshift &
exec-once = rclone mount onedrive: ~/onedrive --vfs-cache-mode full &
exec-once = rclone mount personal_data: ~/personal_data
exec-once = hyprpm reload -n


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1
env = QT_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,xcb
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

xwayland {
    force_zero_scaling = true
}


####################
### LOOK & FEEL  ###
####################
general {
    gaps_in = 2
    gaps_out = 10
    border_size = 0
    col.active_border = $color9
    col.inactive_border = $color5
    resize_on_border = true
    allow_tearing = false
    layout = hy3
}

decoration {
    rounding = 10
    active_opacity = 1
    inactive_opacity = 0.8
    fullscreen_opacity = 1

    blur {
        enabled = true
        size = 3
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    focus_on_activate = true
}


#############
### INPUT ###
#############
input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = .05
    workspace_swipe_min_speed_to_force = 0
}

# Example per-device input configuration
device {
    name = epic-mouse-v1
    sensitivity = 0
}


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Applications
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Y, exec, kitty -e yazi
bind = $mainMod, U, exec, kitty -e yazi /home/sebastiano/onedrive/Unistudium/
bind = $mainMod, T, exec, kitty -e ts
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, bash -c 'pgrep -x wofi >/dev/null && killall wofi || wofi --show drun -n &'
bind = $mainMod, P, exec, zen-browser

# Window management
bind = $mainMod, C, hy3:killactive,
bind = $mainMod, G, hy3:changegroup, toggletab, force_ephemeral
bind = $mainMod, F, hy3:makegroup, opposite
bind = $mainMod, V, hy3:changegroup, opposite
bind = ALT , F, fullscreen
bind = $mainMod SHIFT, C, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill -KILL

# Special functions
bind = ALT, L, exec, hyprlock
bind = $mainMod, M, exit,
bind = ALT, O, exec, rclone mount onedrive: ~/onedrive --vfs-cache-mode full &
bind = ALT+SHIFT, S, exec, ~/.local/bin/screenshot -c
bind = ALT, W, exec, ~/.config/hypr/wallpaper.sh

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Tab focus
bind = ALT+SHIFT, J, cyclenext

bind = ALT, 1, hy3:focustab, index, 1
bind = ALT, 2, hy3:focustab, index, 2
bind = ALT, 3, hy3:focustab, index, 3
bind = ALT, 4, hy3:focustab, index, 4
bind = ALT, 5, hy3:focustab, index, 5
bind = ALT, 6, hy3:focustab, index, 6
bind = ALT, 7, hy3:focustab, index, 7
bind = ALT, 8, hy3:focustab, index, 8
bind = ALT, 9, hy3:focustab, index, 9


# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, hy3:movetoworkspace, 1, follow
bind = $mainMod SHIFT, 2, hy3:movetoworkspace, 2, follow
bind = $mainMod SHIFT, 3, hy3:movetoworkspace, 3, follow
bind = $mainMod SHIFT, 4, hy3:movetoworkspace, 4, follow
bind = $mainMod SHIFT, 5, hy3:movetoworkspace, 5, follow
bind = $mainMod SHIFT, 6, hy3:movetoworkspace, 6, follow
bind = $mainMod SHIFT, 7, hy3:movetoworkspace, 7, follow
bind = $mainMod SHIFT, 8, hy3:movetoworkspace, 8, follow
bind = $mainMod SHIFT, 9, hy3:movetoworkspace, 9, follow
bind = $mainMod SHIFT, 0, hy3:movetoworkspace, 10, follow

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Resize mode (submap)
bind = ALT, R, submap, resize
submap = resize
    binde = , K, resizeactive, 0 -50
    binde = , H, resizeactive, -50 0
    binde = , J, resizeactive, 0 50
    binde = , L, resizeactive, 50 0

    binde = ALT, W, resizeactive, 0 -10
    binde = ALT, A, resizeactive, -10 0
    binde = ALT, S, resizeactive, 0 10
    binde = ALT, D, resizeactive, 10 0

    binde = , escape, submap, reset
submap = reset
    binde = , , exec, hyprctl keyword general:border_active_color 0xFFFFFFFF

# Mouse actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS & WORKSPACES   ###
##############################
# Window rules
windowrulev2 = tile, class:^sioyek$
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# Layer rules
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = ignorealpha 0.5, waybar
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window


